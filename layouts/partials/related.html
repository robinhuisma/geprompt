{{ $related := .Site.RegularPages.Related . | first 3 }}
{{ with $related }}
<div class="related-articles">
  <h3>Lees ook</h3>
  {{ range . }}
  <div class="related-item">
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    <p>{{ .Summary | truncate 100 }}</p>
  </div>
  {{ end }}
</div>
{{ end }}
